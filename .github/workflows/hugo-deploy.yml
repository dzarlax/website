name: Deploy · Lander + Hugo blog

# Merge-deploy: the static lander at repo root owns `/`, Hugo owns the
# `/articles/` and `/topics/` subtrees plus `/index.xml`. We build Hugo,
# drop its generated home page, then copy the lander files on top and
# deploy the union. Until this workflow is flipped to the live branch,
# results land in `gh-pages-preview` for safe inspection.

on:
  push:
    branches: [main]
    paths:
      - "hugo/**"
      - "index.html"
      - "style.css"
      - "ai-workflow.html"
      - "ai-workflow.css"
      - "web/**"
      - "assets/**"
      - "projects.json"
      - "humans.txt"
      - "llms.txt"
      - "robots.txt"
      - "sitemap.xml"
      - "CNAME"
      - ".well-known/**"
      - ".github/workflows/hugo-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hugo-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.161.1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # required for .GitInfo / enableGitInfo
          submodules: false

      - name: Install Hugo
        run: |
          curl -fsSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Resolve latest design-system release tag
        id: ds
        run: |
          TAG=$(curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/dzarlax/design-system/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::warning::Could not resolve design-system release tag, falling back to @main"
            TAG="main"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using design-system tag: $TAG"

      - name: Build Hugo blog
        working-directory: hugo
        env:
          HUGO_PARAMS_DSTAG: ${{ steps.ds.outputs.tag }}
        run: hugo --minify --gc

      - name: Drop Hugo's home placeholder (lander owns /)
        run: |
          rm -f hugo/public/index.html
          ls hugo/public/

      - name: Merge static lander files on top of Hugo output
        run: |
          set -euo pipefail
          # Files & dirs that live at repo root and ship as-is.
          LANDER_PATHS=(
            index.html
            style.css
            ai-workflow.html
            ai-workflow.css
            projects.json
            humans.txt
            llms.txt
            robots.txt
            sitemap.xml
            CNAME
          )
          for p in "${LANDER_PATHS[@]}"; do
            if [ -e "$p" ]; then
              cp -v "$p" "hugo/public/$p"
            fi
          done

          # Directories — copy whole tree.
          for d in web assets .well-known; do
            if [ -d "$d" ]; then
              cp -rv "$d" "hugo/public/"
            fi
          done

          echo "── Final deploy tree ──"
          find hugo/public -maxdepth 2 -type f | sort | head -40

      - name: Deploy to gh-pages-preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hugo/public
          publish_branch: gh-pages-preview
          force_orphan: true
          commit_message: "deploy: ${{ github.sha }}"
