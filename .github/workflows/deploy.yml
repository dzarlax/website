name: Deploy to GitHub Pages

# Unified deploy: builds Hugo blog, drops Hugo's home placeholder, overlays
# the static lander files, uploads the merged tree as a GitHub Pages artifact.
# GH Pages serves the artifact directly — no separate branch to manage.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fires when dzarlax/blog-content pushes new commits to main — see the
  # notify-website.yml workflow in that repo. Lets us rebuild the site
  # whenever an article ships without needing a touch-commit in this repo.
  repository_dispatch:
    types: [blog-content-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.161.1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # required for .GitInfo / enableGitInfo
          submodules: false

      - name: Install Hugo
        run: |
          curl -fsSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Set up Go (for Hugo modules)
        uses: actions/setup-go@v5
        with:
          # Tracks the toolchain that `hugo mod` commands write into go.mod
          # locally. Hugo invokes `go mod` on every modules call which auto-
          # bumps the `go` directive to the running toolchain version, so the
          # CI Go must be ≥ whatever go.mod currently declares.
          go-version: 'stable'

      - name: Fetch Hugo modules
        working-directory: hugo
        run: |
          # blog-content is a public Go-module repo, so no auth setup needed:
          # the default Go module proxy (proxy.golang.org) serves it. We don't
          # pin a version — the vault repo is single-author and we always want
          # the freshest articles in the deploy.
          hugo mod get -u
          hugo mod graph

      - name: Resolve latest design-system release tag
        id: ds
        run: |
          TAG=$(curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/dzarlax/design-system/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::warning::Could not resolve design-system release tag, falling back to @main"
            TAG="main"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using design-system tag: $TAG"

      - name: Build Hugo blog
        working-directory: hugo
        env:
          HUGO_PARAMS_DSTAG: ${{ steps.ds.outputs.tag }}
        run: hugo --minify --gc --destination ../_dist

      - name: Drop Hugo's home placeholder (lander owns /)
        run: rm -f _dist/index.html

      - name: Bake design-system bundle into deploy tree
        # Download dist/dzarlax.{css,js} from the resolved DS release and serve
        # them same-origin from /assets/ds/. Drops the runtime CDN dependency
        # entirely — no jsdelivr poisoned-cache incidents, no statically.io
        # HTTPS-downgrade redirects, and ~50× faster than statically.io's
        # cold cache (~46s on the v1.2.1 reroll vs <100ms same-origin).
        #
        # CDN URLs in sources stay so local previews still work; this step
        # rewrites every emitted HTML file to point at /assets/ds/<file>?v=<tag>.
        # The `?v=<tag>` query forces cache invalidation when DS bumps.
        run: |
          set -euo pipefail
          TAG="${{ steps.ds.outputs.tag }}"
          mkdir -p _dist/assets/ds
          for f in dzarlax.css dzarlax.js; do
            # -L follows the GitHub release-asset 302 to Azure Blob; -f makes
            # the build fail loudly on any non-2xx so a broken release doesn't
            # silently ship an empty bundle.
            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://github.com/dzarlax/design-system/releases/download/${TAG}/${f}" \
              -o "_dist/assets/ds/${f}"
            echo "Baked _dist/assets/ds/${f} ($(wc -c < "_dist/assets/ds/${f}") bytes)"
          done

      - name: Overlay static lander files on top of Hugo output
        run: |
          set -euo pipefail
          TAG="${{ steps.ds.outputs.tag }}"
          LANDER_FILES=(
            index.html style.css
            projects.json humans.txt llms.txt robots.txt sitemap.xml CNAME
            og-default.png
          )
          for f in "${LANDER_FILES[@]}"; do
            if [ -e "$f" ]; then cp -v "$f" "_dist/$f"; fi
          done
          for d in web assets .well-known; do
            if [ -d "$d" ]; then cp -rv "$d" "_dist/"; fi
          done

          # Rewrite every CDN reference (jsdelivr or statically) in any emitted
          # HTML to the same-origin baked path. Run across the whole tree so
          # both the lander's index.html and Hugo-generated blog pages flip.
          find _dist -type f -name '*.html' -print0 | xargs -0 sed -i -E \
            -e "s|https?://cdn\.(jsdelivr\.net/gh\|statically\.io/gh)/dzarlax/design-system[@/][^\"']*dzarlax\.css|/assets/ds/dzarlax.css?v=${TAG}|g" \
            -e "s|https?://cdn\.(jsdelivr\.net/gh\|statically\.io/gh)/dzarlax/design-system[@/][^\"']*dzarlax\.js|/assets/ds/dzarlax.js?v=${TAG}|g"

          echo "── Final deploy tree ──"
          find _dist -maxdepth 2 -type f | sort | head -40
          echo "── DS bake verification ──"
          ls -la _dist/assets/ds/
          grep -REho '(cdn\.(jsdelivr|statically)|/assets/ds/dzarlax)[^"'"'"']*' _dist --include='*.html' | sort -u | head -10

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
