baseURL      = "https://dzarlax.dev/"
locale       = "en-us"
title        = "Alexey Panfilov — Product, AI, Systems"
enableRobotsTXT = true
enableGitInfo   = true

# ── Content source (Hugo Modules, Level 2 vault sync) ────────────────────────
# Article and tag content lives in the public `dzarlax/blog-content` repo
# (the Obsidian vault, with a `go.mod` at its root). Hugo pulls it at build
# time via proxy.golang.org. Two mounts pick out the directories we care
# about from the vault — everything else in the vault (`_meta/`, `.obsidian/`)
# is ignored by simply not being mounted.
#
# Local development overrides the import with a path replacement so you read
# straight from your working copy of the vault:
#     HUGO_MODULE_REPLACEMENTS="github.com/dzarlax/blog-content -> $BLOG_VAULT"
# This is set automatically by bin/preview.sh.
#
# Drafts: articles with `draft: true` in frontmatter live in the public repo
# but Hugo skips them at render — safe to commit work-in-progress.
#
# Section-level `_index.md` files (engineering metadata: LLMS output config,
# sitemap exclusions) stay in this repo under hugo/content/. Article page
# bundles and tag term pages come from the module mounts.
#
# See docs/MIGRATION-LEVEL2.md for the one-time bootstrap of the vault repo.

[module]
  [[module.imports]]
    path = "github.com/dzarlax/blog-content"
    [[module.imports.mounts]]
      source = "articles"
      target = "content/articles"
    [[module.imports.mounts]]
      source = "tags"
      target = "content/tags"
    [[module.imports.mounts]]
      source = "series"
      target = "content/series"

# Google Analytics 4 — same property as the lander (index.html) so the blog
# rolls up into one GA stream. Consumed by Hugo's internal google_analytics
# template, included from layouts/partials/head.html.
googleAnalytics = "G-RT3L9MP58G"

# Markup
[markup]
  [markup.goldmark.renderer]
    unsafe = true            # allow raw HTML in Markdown (for embeds, design-system components)
  [markup.highlight]
    noClasses    = false      # emit CSS classes so the design-system theme can style code blocks
    codeFences   = true
    guessSyntax  = true
    tabWidth     = 2
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4

# Pagination (articles listing)
[pagination]
  pagerSize = 12

# Permalinks
[permalinks]
  articles = "/articles/:slug/"

# Sections that count as "main" for .Site.RegularPages
[params]
  mainSections = ["articles"]
  description  = "Notes on product, AI, and systems by Alexey Panfilov."
  author       = "Alexey Panfilov"
  twitter      = "dzarlax"          # handle without @, used by twitter:site/creator
  github       = "dzarlax"

  # Author social profiles — consumed by Person JSON-LD `sameAs` (helps
  # Google/AI search link the author to a single knowledge-graph entity)
  # and by <link rel="me"> for Mastodon-style author verification.
  # Add entries as new accounts come online; the array is rendered as-is.
  socialProfiles = [
    "https://github.com/dzarlax",
    "https://linkedin.com/in/dzarlax",
    "https://x.com/dzarlax",
    "https://substack.com/@dzarlax",
  ]

  # Design system — pinned tag is set in CI via env (HUGO_PARAMS_dstag);
  # @main is fine for local dev. CDN URLs are assembled in partials/head.html.
  dsTag        = "main"

# Taxonomies — tags (per-article topics) + series (ordered multi-part articles).
[taxonomies]
  tag    = "tags"
  series = "series"

# Output formats — keep RSS on, add JSON for the article index (useful later).
# LLMS is opt-in per-section via content frontmatter (see content/articles/_index.md);
# defined globally here so the format is registered. Emits a plain-text file
# `llms.txt` with markdown-flavoured content per the llmstxt.org convention.
[outputFormats.LLMS]
  mediaType      = "text/plain"
  baseName       = "llms"
  isPlainText    = true
  notAlternative = true

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Minification
[minify]
  minifyOutput = true

# Sitemap — emit at /blog-sitemap.xml so it does not collide with the
# lander's hand-maintained /sitemap.xml (the CI overlay step in
# .github/workflows/deploy.yml would otherwise overwrite Hugo's sitemap).
# Both sitemaps are declared in /robots.txt and Google merges them.
[sitemap]
  filename = "blog-sitemap.xml"
  changefreq = "weekly"
  priority = 0.6
